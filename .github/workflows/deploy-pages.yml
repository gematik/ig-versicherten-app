name: Deploy to GitHub Pages

# Trigger on pushes to main branch, or manually via workflow_dispatch
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

# Grant GITHUB_TOKEN the permissions required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # --- Checkout the repository ---
      - uses: actions/checkout@v4

      # --- Install Asciidoctor for AsciiDoc -> HTML conversion ---
      - name: Install Asciidoctor
        run: |
          sudo apt-get update
          sudo apt-get install -y asciidoctor

      # --- Build the site into _site/ ---
      - name: Build HTML pages
        run: |
          mkdir -p _site

          # --- Generate a dynamic index.adoc that lists all modules ---
          printf '%s\n' \
            '= App des Versicherten – Module' \
            '' \
            ':imagesdir: images' \
            '' \
            'include::docs/app_overview.adoc[leveloffset=+1]' \
            '' \
            '== Module' \
            > _generated_index.adoc

          # --- Dynamically append one entry per module found under modules/ ---
          for module_dir in modules/*/; do
            module_name="$(basename "$module_dir")"
            overview_file="${module_dir}docs/overview.adoc"
            if [ -f "$overview_file" ]; then
              # --- Generate SVG icon for the module ---
              icon_file="_site/images/module_${module_name}.svg"
              mkdir -p _site/images
              text_len=${#module_name}
              width=$(( text_len * 10 + 24 ))
              half=$(( width / 2 ))
              printf '<svg xmlns="http://www.w3.org/2000/svg" width="%d" height="28" viewBox="0 0 %d 28">\n' "$width" "$width" > "$icon_file"
              printf '  <rect width="%d" height="28" rx="6" fill="#0b6abf"/>\n' "$width" >> "$icon_file"
              printf '  <text x="%d" y="18" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">%s</text>\n' "$half" "$module_name" >> "$icon_file"
              printf '</svg>\n' >> "$icon_file"

              echo "" >> _generated_index.adoc
              echo "image:module_${module_name}.svg[link=modules/${module_name}/docs/overview.html,title=${module_name}]" >> _generated_index.adoc
            fi
          done

          # --- Convert the generated index to index.html ---
          asciidoctor -b html5 -o _site/index.html _generated_index.adoc

          # --- Convert docs/ ---
          mkdir -p _site/docs
          for f in docs/*.adoc; do
            [ -f "$f" ] || continue
            asciidoctor -b html5 -a imagesdir=../images \
              -o "_site/docs/$(basename "${f%.adoc}.html")" "$f"
          done

          # --- Convert module docs (generic for all modules) ---
          find modules -name "*.adoc" -path "*/docs/*" | while read f; do
            relpath="${f}"
            outpath="_site/${relpath%.adoc}.html"
            mkdir -p "$(dirname "$outpath")"
            asciidoctor -b html5 -o "$outpath" "$f"
          done

          # --- Copy all images directories (preserve full directory structure) ---
          # Root-level images
          if [ -d "images" ]; then
            mkdir -p _site/images
            cp -r images/* _site/images/ 2>/dev/null || true
          fi

          # Module-level images
          find modules -type d -name "images" | while read imgdir; do
            mkdir -p "_site/$imgdir"
            cp -r "$imgdir"/* "_site/$imgdir"/ 2>/dev/null || true
          done

          # --- List generated site for debugging ---
          echo "::group::Generated site contents"
          find _site -type f | sort
          echo "::endgroup::"

      # --- Fix internal links (.adoc -> .html) in generated HTML ---
      - name: Fix internal links
        run: |
          # Replace .adoc references with .html in all generated HTML files
          find _site -name "*.html" -exec sed -i \
            -e 's/\.adoc"/\.html"/g' \
            -e "s/\.adoc'/\.html'/g" \
            -e 's/\.adoc#/\.html#/g' \
            -e 's/\.adoc<\/a>/\.html<\/a>/g' \
            {} +

      # --- Upload the built site as a Pages artifact ---
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # --- Deploy the artifact to GitHub Pages ---
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

