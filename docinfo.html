<style>
h1, h2, h3, h4, h5, h6 {
  color: #000E52 !important;
}
#toctitle {
  color: #000E52 !important;
}
#breadcrumb-bar {
  background: #000E52;
  padding: 8px 16px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 14px;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 2000;
  color: rgba(255,255,255,.6);
}
#breadcrumb-bar a {
  color: #fff;
  text-decoration: none;
}
#breadcrumb-bar a:hover {
  text-decoration: underline;
}
#breadcrumb-bar .separator {
  margin: 0 6px;
  color: rgba(255,255,255,.4);
}
#breadcrumb-bar .current {
  color: rgba(255,255,255,.85);
}
/* Schiebt den Body-Inhalt unter den fixed Header */
body {
  padding-top: 36px !important;
}
/* Schiebt das fixierte TOC-Panel ebenfalls nach unten */
#toc.toc2 {
  top: 36px !important;
  height: calc(100% - 36px) !important;
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var defined = {
    'docs': 'Dokumentation',
    'modules': 'Module',
    'overview': 'Übersicht'
  };

  function labelFromFilename(name) {
    name = name.replace(/\.html$/, '');
    if (defined[name]) return defined[name];
    // AF_12345_Beschreibung -> Beschreibung (lesbar)
    var af = name.match(/^AF_\d+_(.+)$/);
    if (af) return af[1].replace(/_/g, ' ');
    return name.replace(/_/g, ' ');
  }

  var path = window.location.pathname;
  // Pfadsegmente relativ zum Site-Root ermitteln
  // Unterstützt sowohl /repo/_site/docs/foo.html als auch /docs/foo.html
  var segments = path.replace(/^\//, '').split('/');

  // Finde den Index des Site-Einstiegspunkts (hinter _site oder dem repo-root)
  var siteStart = 0;
  for (var s = 0; s < segments.length; s++) {
    if (segments[s] === '_site') { siteStart = s + 1; break; }
  }
  var relSegments = segments.slice(siteStart);

  // Tiefe berechnen für relative Links
  var depth = relSegments.length - 1;
  var prefix = '';
  for (var i = 0; i < depth; i++) prefix += '../';
  if (prefix === '') prefix = './';

  var crumbs = [];
  // Startseite immer als erstes Element
  var isHome = (relSegments.length <= 1 &&
    (relSegments[0] === '' || relSegments[0] === 'index.html'));

  if (isHome) {
    crumbs.push('<span class="current">Startseite</span>');
  } else {
    crumbs.push('<a href="' + prefix + 'index.html">Startseite</a>');

    // Zwischensegmente (Verzeichnisse)
    var accumPath = prefix;
    for (var j = 0; j < relSegments.length - 1; j++) {
      var seg = relSegments[j];
      if (seg === 'docs') {
        // docs-Verzeichnis hat keinen eigenen Index, nur Label anzeigen
        crumbs.push('<span class="current">' + (defined[seg] || seg) + '</span>');
        // Pfad weiter aufbauen
        accumPath += seg + '/';
      } else if (seg === 'modules') {
        // modules überspringen, da redundant mit Modulname
        accumPath += seg + '/';
      } else {
        // Modulname (z.B. DiPag) – Link zur overview.html des Moduls
        var overviewHref = accumPath + seg + '/docs/overview.html';
        crumbs.push('<a href="' + overviewHref + '">' + seg + '</a>');
        accumPath += seg + '/';
      }
    }

    // Letztes Segment = aktuelle Seite
    var lastSeg = relSegments[relSegments.length - 1];
    crumbs.push('<span class="current">' + labelFromFilename(lastSeg) + '</span>');
  }

  var sep = '<span class="separator">\u203A</span>';
  var bar = document.createElement('div');
  bar.id = 'breadcrumb-bar';
  bar.innerHTML = crumbs.join(sep);
  document.body.insertBefore(bar, document.body.firstChild);
});
</script>
